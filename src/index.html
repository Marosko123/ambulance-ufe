<!DOCTYPE html>
<html dir="ltr" lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Ambulance Waiting List - Maros Bednar</title>

    <script type="module" src="/build/ambulance-ufe.esm.js"></script>
    <script nomodule src="/build/ambulance-ufe.js"></script>
    <style>
      body { margin: 0; padding: 0; font-family: Roboto, sans-serif; }
    </style>
  </head>
  <body>
    <div id="ambulance-root"></div>
    <script>
      (function () {
        var host = window.location.hostname;
        var isLocalDev = /^(localhost|127\.|::1|0\.0\.0\.0)$/.test(host) || host === '';
        var apiBase = isLocalDev ? 'http://localhost:5001/api' : '/api';
        var basePath = isLocalDev ? '/ambulance-wl/' : '/';
        var root = document.getElementById('ambulance-root');
        root.innerHTML =
          '<mb-ambulance-wl-app ambulance-id="bobulova" api-base="' + apiBase + '" base-path="' + basePath + '"></mb-ambulance-wl-app>';
      })();
    </script>
  </body>
</html>
